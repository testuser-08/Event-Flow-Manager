kind = "web"
previewPath = "/"
title = "Volunteer Hub"
version = "1.0.0"
id = "artifacts/volunteer-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/volunteer-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/volunteer-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/volunteer-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
