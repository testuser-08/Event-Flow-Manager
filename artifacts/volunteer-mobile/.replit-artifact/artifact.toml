kind = "mobile"
previewPath = "/volunteer-mobile/"
title = "Volunteer Schedule"
version = "1.0.0"
id = "artifacts/volunteer-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/volunteer-mobile/" ]
localPort = 20136

[services.development]
run = "pnpm --filter @workspace/volunteer-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/volunteer-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/volunteer-mobile", "run", "serve" ]

[services.env]
PORT = "20136"
BASE_PATH = "/volunteer-mobile/"
